<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-cloud">
  <div id="toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-white border-l-4 rounded-lg shadow-lg p-4 min-w-[300px]" id="toastContent">
      <div class="flex items-center gap-3">
        <i class="text-2xl" id="toastIcon"></i>
        <div class="flex-1">
          <p class="font-semibold text-midnight" id="toastTitle"></p>
          <p class="text-sm text-secondary" id="toastMessage"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-surface rounded-xl shadow-lg border border-custom p-8">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-deep-plum rounded-full mb-4">
          <i class="fas fa-key text-cloud text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-midnight">Forgot Password</h1>
        <p class="text-secondary mt-2">Enter your admin email to receive a reset link.</p>
      </div>

      <form id="forgotPasswordForm">
        <div class="mb-6">
          <label class="block text-sm font-medium text-midnight mb-2">Email Address</label>
          <input
            type="email"
            id="resetEmail"
            required
            placeholder="admin@example.com"
            class="w-full px-4 py-3 rounded-lg border border-custom bg-cloud focus:outline-none focus:ring-2 focus:ring-deep-plum"
          >
        </div>

        <button
          type="submit"
          class="w-full py-3 bg-deep-plum text-cloud rounded-lg font-medium hover:bg-opacity-90"
        >
          Send Reset Link
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="index.html" class="text-deep-plum font-medium hover:underline">
          Back to Login
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/password-reset.js"></script>
</body>
</html>
